org.gradle.daemon=false
org.gradle.parallel=false
org.gradle.caching=false
org.gradle.configuration-cache=false
org.gradle.jvmargs=-Xmx8g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError
kotlin.daemon.jvmargs=-Xmx3g -XX:ReservedCodeCacheSize=512m -XX:+UseParallelGC
kotlin.incremental=true
kotlin.incremental.native=true
kotlin.build.report.output=file
kotlin.build.report.include_compiler_arguments=true
kotlin.native.parallelThreads=0

# Project coordinates and layout
project.group=io.github.kotlinmania
project.version=0.1.1
project.name=spring-boot-kotlin
project.frameworkName=SpringBoot
project.namespace=io.github.kotlinmania.spring.boot

# POM Metadata
project.pom.description=Kotlin Multiplatform port of Spring Boot
project.pom.licenseName=MIT
project.pom.licenseUrl=https://opensource.org/licenses/MIT

# Spring Boot buildSrc compatibility pins
version=0.1.1
latestVersion=true
spring.build-type=oss
assertjVersion=3.27.7
checkstyleToolVersion=10.12.4
commonsCodecVersion=1.21.0
graalVersion=25
hamcrestVersion=3.0
jackson2Version=2.21.4
jacksonVersion=3.1.4
javaFormatVersion=0.0.47
junitJupiterVersion=6.0.3
kotlinVersion=2.4.0
mavenVersion=3.9.13
mockitoVersion=5.23.0
nativeBuildToolsVersion=1.1.1
nullabilityPluginVersion=0.0.11
protobufGradlePluginVersion=0.9.6
snakeYamlVersion=2.6
springFrameworkVersion=7.0.8-SNAPSHOT
springFramework60xVersion=6.0.23
tomcatVersion=11.0.22
kotlin.stdlib.default.dependency=false

# CodeQL Specific Dependencies
# (commonMain deps live in gradle/libs.versions.toml — spring-boot-commonMain bundle)
project.dependencies.commonMainBundle=spring-boot-commonMain
project.codeql.kotlinSourceSets=commonMain,jvmMain
project.codeql.kotlinCommonSourceSets=commonMain

project.codeql.androidKotlinSourceSets=commonMain,androidMain
# ============================================================================
